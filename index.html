<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>駐車場記録アプリ</title>
<style>
#map { height: 60vh; }
body { font-family: sans-serif; margin: 0; }
.form { padding: 10px; }
input, textarea, select { width: 100%; margin: 5px 0; }
</style>
</head>
<body>

<div id="map"></div>

<div class="form">
<input id="name" placeholder="駐車場名">
<input id="address" placeholder="住所">
<select id="card">
<option value="OK">法人カードOK</option>
<option value="NG">法人カードNG</option>
</select>
<input id="price" placeholder="金額">
<textarea id="note" placeholder="注意点"></textarea>
<button onclick="addParking()">登録</button>
<button onclick="getLocation()">現在地取得</button>
</div>

<script>
let map;
let markers = [];

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 35.4478, lng: 139.6425 },
    zoom: 14,
  });
  loadData();
}

function getIcon(name) {
  if (name.includes("タイムズ")) {
    return "https://maps.google.com/mapfiles/ms/icons/yellow-dot.png";
  }
  if (name.includes("三井")) {
    return "https://maps.google.com/mapfiles/ms/icons/blue-dot.png";
  }
  return null;
}

function addParking() {
  const data = {
    name: document.getElementById("name").value,
    address: document.getElementById("address").value,
    card: document.getElementById("card").value,
    price: document.getElementById("price").value,
    note: document.getElementById("note").value,
  };

  if (!data.name || !data.address) {
    alert("駐車場名と住所は必須です");
    return;
  }

  geocodeAddress(data);
}

function geocodeAddress(data) {
  const geocoder = new google.maps.Geocoder();
  geocoder.geocode({ address: data.address }, (results, status) => {
    if (status === "OK") {
      const loc = results[0].geometry.location;
      data.lat = loc.lat();
      data.lng = loc.lng();
      saveData(data);
      addMarker(data);
    } else {
      alert("住所変換失敗");
    }
  });
}

    map: map,
    title: data.name,
    icon: getIcon(data.name),
  });
