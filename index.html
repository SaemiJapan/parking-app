<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>駐車場記録アプリ</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map { height: 60vh; }
body { font-family: sans-serif; margin: 0; }
.form { padding: 10px; }
input, textarea, select { width: 100%; margin: 5px 0; }
</style>
</head>

<body>

<div id="map"></div>

<div class="form">
<input id="name" placeholder="駐車場名">
<input id="address" placeholder="住所">
<select id="card">
<option value="OK">法人カードOK</option>
<option value="NG">法人カードNG</option>
</select>
<input id="price" placeholder="金額">
<textarea id="note" placeholder="注意点"></textarea>
<button onclick="addParking()">登録</button>
<button onclick="getLocation()">現在地取得</button>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map;
let markers = [];

// 初期化
map = L.map('map').setView([35.4478, 139.6425], 14);

// OpenStreetMapタイル
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

// アイコン設定
function getIcon(name) {
  if (name.includes("タイムズ")) {
    return L.icon({
      iconUrl: "https://maps.google.com/mapfiles/ms/icons/yellow-dot.png",
      iconSize: [32, 32]
    });
  }
  if (name.includes("三井")) {
    return L.icon({
      iconUrl: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png",
      iconSize: [32, 32]
    });
  }
  return null;
}

// 登録
function addParking() {
  const data = {
    name: document.getElementById("name").value,
    address: document.getElementById("address").value,
    card: document.getElementById("card").value,
    price: document.getElementById("price").value,
    note: document.getElementById("note").value,
  };

  if (!data.name || !data.address) {
    alert("駐車場名と住所は必須です");
    return;
  }

  geocodeAddress(data);
}

// 住所→緯度経度（無料API）
function geocodeAddress(data) {
  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(data.address)}`)
    .then(res => res.json())
    .then(results => {
      if (results.length > 0) {
        data.lat = parseFloat(results[0].lat);
        data.lng = parseFloat(results[0].lon);
        saveData(data);
        addMarker(data);
      } else {
        alert("住所変換失敗");
      }
    });
}

// マーカー追加
function addMarker(data) {
  const marker = L.marker([data.lat, data.lng], {
    icon: getIcon(data.name)
  }).addTo(map);

  marker.bindPopup(`
    <b>${data.name}</b><br>
    ${data.address}<br>
    カード: ${data.card}<br>
    金額: ${data.price}<br>
    ${data.note}
  `);

  markers.push(marker);
}

// 保存
function saveData(data) {
  const list = JSON.parse(localStorage.getItem("parkings") || "[]");
  list.push(data);
  localStorage.setItem("parkings", JSON.stringify(list));
}

// 読み込み
function loadData() {
  const list = JSON.parse(localStorage.getItem("parkings") || "[]");
  list.forEach(addMarker);
}
loadData();

// 現在地取得
function getLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    map.setView([lat, lng], 15);
  });
}
</script>

</body>
</html>
